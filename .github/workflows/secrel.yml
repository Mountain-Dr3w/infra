name: SecRel Pipeline

on:
  workflow_call:
    inputs:
      dockerfile:
        description: 'Path to Dockerfile'
        required: true
        type: string
      docker-context:
        description: 'Docker build context path'
        required: false
        type: string
        default: '.'
      image-name:
        description: 'Container image name (e.g., enforcer-backend)'
        required: true
        type: string
      semgrep-config:
        description: 'Semgrep ruleset config'
        required: false
        type: string
        default: 'p/default'
    outputs:
      image-tag:
        description: 'The short SHA image tag that was pushed (e.g., sha-abc1234)'
        value: ${{ jobs.build-scan-push.outputs.image-tag }}

jobs:
  # Stage 1: Secret detection (HARD GATE)
  secret-scan:
    name: 'Gitleaks: Secret Detection'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Stage 2: Static analysis (HARD GATE)
  sast:
    name: 'Semgrep: Static Analysis'
    runs-on: ubuntu-latest
    needs: [secret-scan]
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - run: semgrep scan --config ${{ inputs.semgrep-config }} --error --severity ERROR

  # Stage 3: Build, scan image, generate SBOM, push
  build-scan-push:
    name: 'Build, Scan, Push'
    runs-on: ubuntu-latest
    needs: [sast]
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.set-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: set-tag
        run: echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.docker-context }}
          file: ${{ inputs.dockerfile }}
          push: false
          load: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}:${{ steps.set-tag.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 'Trivy: Image Vulnerability Scan (HARD GATE)'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}:${{ steps.set-tag.outputs.tag }}
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: 'Syft: Generate SBOM'
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}:${{ steps.set-tag.outputs.tag }}
          format: spdx-json
          artifact-name: sbom-${{ inputs.image-name }}.spdx.json

      - name: Push image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.docker-context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}:${{ steps.set-tag.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
