name: Deploy (Docker Compose)

on:
  workflow_call:
    inputs:
      service-name:
        description: 'Docker Compose service name to restart'
        required: true
        type: string
      image-name:
        description: 'GHCR image name'
        required: true
        type: string
      image-tag:
        description: 'Image tag to deploy'
        required: true
        type: string
      compose-file:
        description: 'Path to project compose file (relative to /opt/infra)'
        required: true
        type: string
      run-migrations:
        description: 'Whether to run database migrations before deploy'
        required: false
        type: boolean
        default: false
      migration-command:
        description: 'Migration command to run inside the container'
        required: false
        type: string
        default: 'npm run migrate'
    secrets:
      VPS_HOST:
        required: true
      VPS_USER:
        required: true
      DEPLOY_SSH_KEY:
        required: true
      GHCR_TOKEN:
        description: 'Token for pulling images from GHCR (pass GITHUB_TOKEN from caller)'
        required: true

jobs:
  deploy:
    name: 'Deploy to VPS'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: GHCR_TOKEN
          script: |
            set -euo pipefail
            cd /opt/infra
            sudo install -d -o "$(id -un)" -g "$(id -gn)" /opt/infra/backups

            echo "=== Authenticating to GHCR ==="
            OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${OWNER}" --password-stdin

            echo "=== Pulling new image ==="
            docker pull ghcr.io/${OWNER}/${{ inputs.image-name }}:${{ inputs.image-tag }}

            # Pre-migration backup
            if [ "${{ inputs.run-migrations }}" = "true" ]; then
                echo "=== Creating pre-migration database backup ==="
                BACKUP_FILE="/opt/infra/backups/pre-migrate-$(date +%Y%m%d-%H%M%S).sql"
                docker compose -f compose/docker-compose.yml exec -T postgres \
                    pg_dump -U enforcer enforcer_dev \
                    | sudo tee "${BACKUP_FILE}" > /dev/null

                echo "=== Running migrations ==="
                docker compose \
                    -f compose/docker-compose.yml \
                    -f compose/${{ inputs.compose-file }} \
                    run --rm ${{ inputs.service-name }} ${{ inputs.migration-command }}
            fi

            echo "=== Updating image tag ==="
            export IMAGE_TAG="${{ inputs.image-tag }}"

            echo "=== Restarting service ==="
            docker compose \
                -f compose/docker-compose.yml \
                -f compose/${{ inputs.compose-file }} \
                up -d ${{ inputs.service-name }}

            echo "=== Cleaning up old images ==="
            docker image prune -f

            echo "=== Deploy complete ==="
            docker ps --filter "name=${{ inputs.service-name }}"
